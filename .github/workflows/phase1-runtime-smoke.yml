name: Phase 1 runtime smoke

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [phase0-foundation]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: disclosure_automation_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d disclosure_automation_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/backend/disclosure_api

    env:
      MIX_ENV: dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_DB: disclosure_automation_dev
      PORT: 4000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: 1.19.5
          otp-version: 28.1

      - name: Install dependencies
        run: mix deps.get

      - name: Create and migrate database
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Compile
        run: mix compile

      - name: Run runtime smoke
        run: |
          rm -f health.json poll.json digest.json server.log
          mix phx.server > server.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            kill "$SERVER_PID" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:4000/api/health > health.json; then
              break
            fi
            sleep 2
          done

          if [ ! -s health.json ]; then
            echo 'health check failed'
            tail -n 200 server.log || true
            exit 1
          fi

          curl -sf -X POST http://127.0.0.1:4000/api/admin/sources/sec_press_releases/poll > poll.json
          curl -sf "http://127.0.0.1:4000/api/feed/digest/latest?edition=breaking" > digest.json

      - name: Comment smoke result on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const root = path.join(process.env.GITHUB_WORKSPACE, 'apps/backend/disclosure_api');
            const read = (name, max = 1500) => {
              try {
                return fs.readFileSync(path.join(root, name), 'utf8').slice(0, max);
              } catch (e) {
                return '(missing)';
              }
            };
            const tail = (name, lines = 80) => {
              try {
                const raw = fs.readFileSync(path.join(root, name), 'utf8');
                return raw.split('\n').slice(-lines).join('\n').slice(0, 4000);
              } catch (e) {
                return '(missing)';
              }
            };
            const body = [
              '### Phase 1 runtime smoke',
              `- sha: ${context.sha}`,
              `- status: ${'${{ job.status }}'}`,
              '',
              '#### /api/health',
              '```json',
              read('health.json'),
              '```',
              '',
              '#### poll result',
              '```json',
              read('poll.json'),
              '```',
              '',
              '#### digest result',
              '```json',
              read('digest.json'),
              '```',
              '',
              '#### server.log tail',
              '```',
              tail('server.log'),
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
