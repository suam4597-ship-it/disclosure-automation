name: Phase 0 validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [phase0-foundation]

jobs:
  validate-phase0:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Phase 0 artifacts
        run: python3 scripts/validate_phase0_artifacts.py
