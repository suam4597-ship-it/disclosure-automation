name: Phase 1 backend verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [phase0-foundation]

jobs:
  disclosure-api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: disclosure_automation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d disclosure_automation_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/backend/disclosure_api

    env:
      MIX_ENV: test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_TEST_DB: disclosure_automation_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: 1.19.5
          otp-version: 28.1

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            apps/backend/disclosure_api/deps
            apps/backend/disclosure_api/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('apps/backend/disclosure_api/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Create and migrate database
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors
