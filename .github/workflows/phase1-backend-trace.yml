name: Phase 1 backend trace

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [phase0-foundation]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  trace:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: disclosure_automation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d disclosure_automation_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/backend/disclosure_api

    env:
      MIX_ENV: test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_TEST_DB: disclosure_automation_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: 1.19.5
          otp-version: 28.1

      - id: deps
        name: Install dependencies
        continue-on-error: true
        run: |
          set -o pipefail
          mix deps.get 2>&1 | tee deps.log

      - id: format
        name: Check formatting
        continue-on-error: true
        run: |
          set -o pipefail
          mix format --check-formatted 2>&1 | tee format.log

      - id: db
        name: Create and migrate database
        continue-on-error: true
        run: |
          set -o pipefail
          (mix ecto.create && mix ecto.migrate) 2>&1 | tee db.log

      - id: compile
        name: Compile with warnings as errors
        continue-on-error: true
        run: |
          set -o pipefail
          mix compile --warnings-as-errors 2>&1 | tee compile.log

      - name: Comment trace on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const root = path.join(process.env.GITHUB_WORKSPACE, 'apps/backend/disclosure_api');
            const tail = (name) => {
              try {
                const raw = fs.readFileSync(path.join(root, name), 'utf8');
                return raw.split('\n').slice(-20).join('\n').slice(0, 3000);
              } catch (e) {
                return '(no log captured)';
              }
            };

            const body = [
              '### Phase 1 backend trace',
              `- sha: ${context.sha}`,
              `- deps: ${'${{ steps.deps.outcome }}'}`,
              `- format: ${'${{ steps.format.outcome }}'}`,
              `- db: ${'${{ steps.db.outcome }}'}`,
              `- compile: ${'${{ steps.compile.outcome }}'}`,
              '',
              '#### format.log tail',
              '```',
              tail('format.log'),
              '```',
              '',
              '#### compile.log tail',
              '```',
              tail('compile.log'),
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail job if any check failed
        if: steps.deps.outcome != 'success' || steps.format.outcome != 'success' || steps.db.outcome != 'success' || steps.compile.outcome != 'success'
        run: exit 1
