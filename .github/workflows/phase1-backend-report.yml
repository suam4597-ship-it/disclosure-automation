name: Phase 1 backend report

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [phase0-foundation]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  disclosure-api-report:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: disclosure_automation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d disclosure_automation_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/backend/disclosure_api

    env:
      MIX_ENV: test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_TEST_DB: disclosure_automation_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: 1.19.5
          otp-version: 28.1

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Create and migrate database
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Comment result on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Phase 1 backend report',
              `- workflow: ${context.workflow}`,
              `- run_id: ${context.runId}`,
              `- status: ${'${{ job.status }}'}`,
              `- sha: ${context.sha}`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
