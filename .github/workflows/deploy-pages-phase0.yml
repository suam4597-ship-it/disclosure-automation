name: Deploy Phase 0 web to GitHub Pages

on:
  push:
    branches:
      - phase0-foundation
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-pages-phase0.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Check static web JavaScript syntax
        run: |
          node --check apps/web/config.js
          node --check apps/web/script.js

          python3 - <<'PY'
          import re
          from pathlib import Path

          html = Path("apps/web/index.html").read_text(encoding="utf-8")
          scripts = re.findall(r"<script>(.*?)</script>", html, flags=re.S)
          Path("/tmp/globalpulse-index-inline.js").write_text("\n;\n".join(scripts), encoding="utf-8")
          print(f"extracted inline scripts: {len(scripts)}")
          PY

          node --check /tmp/globalpulse-index-inline.js

      - name: Prepare static site
        run: |
          mkdir -p site
          cp -R apps/web/. site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
