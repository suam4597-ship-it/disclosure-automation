version: 1
defaults:
  timezone: UTC
  poll_cron: "*/15 * * * *"
  parser_key: rss_v1
  ranking_weight: 1.0
  active: true

sources:
  - source_key: sec_press_releases
    display_name: SEC Press Releases
    source_type: rss
    base_url: https://www.sec.gov/news/pressreleases.rss
    healthcheck_url: https://www.sec.gov
    parser_key: rss_v1
    poll_cron: "*/10 * * * *"
    ranking_weight: 1.4
    coverage_tags: [regulatory, enforcement, markets]
    active: true
    config:
      fixture_path: source_payloads/sec_press_releases.xml

  - source_key: sec_edgar_current_8k_filings
    display_name: SEC EDGAR Current 8-K Filings
    source_type: atom
    base_url: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcurrent&type=8-K&owner=include&count=100&output=atom"
    healthcheck_url: https://www.sec.gov/edgar
    parser_key: rss_v1
    poll_cron: "*/10 * * * *"
    ranking_weight: 1.45
    coverage_tags: [us, disclosure, filing, sec_edgar, markets]
    active: true
    config:
      disable_live_fixture_fallback: true
      max_items_per_poll: 50
      detail_fetch_limit: 10
      detail_fetch_timeout_ms: 8000
      live_headers:
        user-agent: disclosure-automation-phase1 suam4597@gmail.com

