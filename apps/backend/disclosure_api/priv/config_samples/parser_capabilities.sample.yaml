version: 1
defaults:
  enabled: true
  timeout_ms: 8000
  max_items_per_poll: 50
  supports_pagination: false
  supports_detail_fetch: false
  fallback_language: en

parsers:
  - parser_key: rss_v1
    display_name: RSS / Atom Entry Parser
    enabled: true
    input_types: [rss, atom]
    output_contract: canonical_document_v1
    timeout_ms: 5000
    max_items_per_poll: 100
    supports_pagination: false
    supports_detail_fetch: true
    extraction:
      id_fields: [guid, id, link]
      title_fields: [title]
      summary_fields: [summary, description]
      body_fields: [content, content_encoded]
      published_at_fields: [published, pubDate, updated]
      author_fields: [author, dc_creator]
      category_fields: [category, tags]
    normalization:
      trim_html: true
      decode_entities: true
      collapse_whitespace: true
      timezone_strategy: source_default
      missing_summary_strategy: first_paragraph
    quality:
      minimum_title_length: 8
      reject_empty_url: true
      reject_future_timestamps: true

  - parser_key: euronext_company_pr_rss_v1
    display_name: Euronext Company Press Release RSS Parser
    enabled: true
    input_types: [rss]
    output_contract: canonical_document_v1
    timeout_ms: 5000
    max_items_per_poll: 25
    supports_pagination: false
    supports_detail_fetch: true
    extraction:
      id_fields: [guid, link]
      title_fields: [title]
      summary_fields: [description]
      body_fields: [description]
      published_at_fields: [pubDate]
      author_fields: [dc_creator]
      category_fields: [category]
    normalization:
      trim_html: true
      decode_entities: true
      collapse_whitespace: true
      prefer_english_release_links: true
      timezone_strategy: source_default
      missing_summary_strategy: bounded_metadata_summary
    quality:
      minimum_title_length: 8
      reject_empty_url: true
      reject_html_payload: true
      reject_future_timestamps: true

  - parser_key: fsma_stori_api_v1
    display_name: Belgium FSMA STORI API Parser
    enabled: true
    input_types: [json, api]
    output_contract: canonical_document_v1
    timeout_ms: 5000
    max_items_per_poll: 25
    supports_pagination: false
    supports_detail_fetch: true
    extraction:
      id_fields:
        - requiredReportingTopicId
        - mainDocuments.fileDataId
      title_fields:
        - companyName
        - documentTitle
        - reportingTopicName
      summary_fields:
        - reportingTopicName
        - mainDocuments.originalFileName
        - isinCodes.code
      url_fields:
        - mainDocuments.fileDataId
      published_at_fields:
        - datePublication
        - dateReceived
      category_fields:
        - reportingTopicName
    normalization:
      source_shape: fsma_stori_result_json
      trim_html: true
      collapse_whitespace: true
      timezone_strategy: source_naive_utc_iso
      missing_summary_strategy: bounded_metadata_summary
    quality:
      minimum_title_length: 8
      reject_empty_url: true
      reject_html_payload: true
      reject_future_timestamps: true

  - parser_key: fca_nsm_search_api_v1
    display_name: UK FCA NSM Search API Parser
    enabled: true
    input_types: [json, api]
    output_contract: canonical_document_v1
    timeout_ms: 5000
    max_items_per_poll: 25
    supports_pagination: false
    supports_detail_fetch: true
    extraction:
      id_fields:
        - hits.hits._source.disclosure_id
        - hits.hits._source.seq_id
        - hits.hits._source.download_link
      title_fields:
        - hits.hits._source.company
        - hits.hits._source.headline
      summary_fields:
        - hits.hits._source.type
        - hits.hits._source.source
        - hits.hits._source.lei
        - hits.hits._source.tag_esef
      url_fields:
        - hits.hits._source.download_link
      published_at_fields:
        - hits.hits._source.publication_date
        - hits.hits._source.submitted_date
        - hits.hits._source.document_date
      category_fields:
        - hits.hits._source.type
    normalization:
      source_shape: fca_nsm_search_json
      trim_html: true
      collapse_whitespace: true
      timezone_strategy: source_utc_iso
      missing_summary_strategy: bounded_metadata_summary
    quality:
      minimum_title_length: 8
      reject_empty_url: true
      reject_html_payload: true
      reject_future_timestamps: true

  - parser_key: nasdaq_nordic_cns_jsonp_v1
    display_name: Nasdaq Nordic Company News JSONP Parser
    enabled: true
    input_types: [jsonp, api]
    output_contract: canonical_document_v1
    timeout_ms: 5000
    max_items_per_poll: 25
    supports_pagination: false
    supports_detail_fetch: true
    extraction:
      id_fields:
        - results.item.disclosureId
        - results.item.messageUrl
      title_fields:
        - results.item.company
        - results.item.headline
      summary_fields:
        - results.item.cnsCategory
        - results.item.market
        - results.item.language
        - results.item.attachment.fileName
      url_fields:
        - results.item.messageUrl
      published_at_fields:
        - results.item.published
        - results.item.releaseTime
      category_fields:
        - results.item.cnsCategory
    normalization:
      source_shape: nasdaq_nordic_cns_jsonp
      trim_html: true
      collapse_whitespace: true
      timezone_strategy: source_cet_datetime
      missing_summary_strategy: bounded_metadata_summary
    quality:
      minimum_title_length: 8
      reject_empty_url: true
      reject_html_payload: true
      reject_future_timestamps: true

  - parser_key: info_financiere_oam_v1
    display_name: France Info-Financiere OAM JSON Parser
    enabled: true
    input_types: [json, api]
    output_contract: canonical_document_v1
    timeout_ms: 5000
    max_items_per_poll: 25
    supports_pagination: false
    supports_detail_fetch: false
    extraction:
      id_fields: [uin_idt_uin, url_de_recuperation]
      title_fields:
        - identificationsociete_iso_nom_soc
        - informationdeposee_inf_tit_inf
      summary_fields:
        - type_of_information
        - subtype_of_information
        - identificationsociete_iso_cd_isi
        - identificationsociete_iso_code_tkr_iso_cd_tkr
      url_fields: [url_de_recuperation]
      published_at_fields:
        - informationdeposee_inf_dat_emt
        - uin_dat_amf
      category_fields:
        - subtype_of_information
        - type_of_information
    normalization:
      source_shape: opendatasoft_results
      trim_html: true
      collapse_whitespace: true
      timezone_strategy: source_timestamp_offset
      missing_summary_strategy: bounded_metadata_summary
    quality:
      minimum_title_length: 8
      reject_empty_url: true
      reject_html_payload: true
      reject_future_timestamps: true

  - parser_key: emarket_storage_html_v1
    display_name: Italy eMarket Storage Regulated Communication HTML Parser
    enabled: true
    input_types: [html]
    output_contract: canonical_document_v1
    timeout_ms: 5000
    max_items_per_poll: 25
    supports_pagination: false
    supports_detail_fetch: false
    extraction:
      id_fields:
        - data_protocollo
        - pdf_href
      title_fields:
        - news_azienda
        - news_title
      summary_fields:
        - category
        - news_azienda
      url_fields:
        - pdf_href
      published_at_fields:
        - time_text
      category_fields:
        - Comunicati Regolamentati
    normalization:
      source_shape: emarket_storage_views_row_html
      trim_html: true
      decode_entities: true
      collapse_whitespace: true
      timezone_strategy: source_naive_utc_ddmmyyyy
      missing_summary_strategy: bounded_metadata_summary
    quality:
      minimum_title_length: 8
      reject_empty_url: true
      reject_non_emarket_storage_payload: true
      reject_future_timestamps: true

  - parser_key: afm_financial_reporting_csv_v1
    display_name: Netherlands AFM Financial Reporting CSV Parser
    enabled: true
    input_types: [csv, api]
    output_contract: canonical_document_v1
    timeout_ms: 5000
    max_items_per_poll: 25
    supports_pagination: false
    supports_detail_fetch: false
    extraction:
      id_fields:
        - datum_deponering
        - uitgevende_instelling
        - boekjaar
        - soort
      title_fields:
        - uitgevende_instelling
        - soort
      summary_fields:
        - boekjaar
        - soort
      url_fields:
        - register_url
      published_at_fields:
        - datum_deponering
      category_fields:
        - soort
    normalization:
      source_shape: afm_financial_reporting_semicolon_csv
      trim_html: true
      collapse_whitespace: true
      timezone_strategy: source_naive_utc_iso
      missing_summary_strategy: bounded_metadata_summary
    quality:
      minimum_title_length: 8
      reject_empty_url: true
      reject_html_payload: true
      reject_future_timestamps: true

  - parser_key: luxse_oam_graphql_v1
    display_name: Luxembourg LuxSE OAM GraphQL Parser
    enabled: true
    input_types: [json, api, graphql]
    output_contract: canonical_document_v1
    timeout_ms: 5000
    max_items_per_poll: 25
    supports_pagination: false
    supports_detail_fetch: false
    extraction:
      id_fields:
        - submissionId
      title_fields:
        - issuerName
        - submissionTypeLabel
      summary_fields:
        - actionsList
        - referenceYear
        - referenceStartDate
        - referenceEndDate
      url_fields:
        - oam_search_url
      published_at_fields:
        - publicationDate
      category_fields:
        - submissionTypeLabel
    normalization:
      source_shape: luxse_oam_graphql_submissions
      trim_html: true
      collapse_whitespace: true
      timezone_strategy: source_timestamp_offset
      missing_summary_strategy: bounded_metadata_summary
    quality:
      minimum_title_length: 8
      reject_empty_url: true
      reject_html_payload: true
      reject_future_timestamps: true
