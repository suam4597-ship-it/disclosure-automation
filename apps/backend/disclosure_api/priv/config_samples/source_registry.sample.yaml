    parser_key: rss_v1
    poll_cron: "*/15 * * * *"
    ranking_weight: 1.35
    coverage_tags:
      - kr
      - regulatory
      - disclosure
      - markets
    active: true
    config:
      fixture_path: source_payloads/kr_dart_disclosures.xml

