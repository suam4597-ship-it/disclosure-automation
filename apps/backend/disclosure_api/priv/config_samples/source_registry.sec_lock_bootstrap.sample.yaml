version: 1
defaults:
  timezone: UTC
  poll_cron: "*/15 * * * *"
  parser_key: rss_v1
  ranking_weight: 1.0
  active: true

sources:
  - source_key: sec_press_releases
    display_name: SEC Press Releases
    source_type: rss
    base_url: https://www.sec.gov/news/pressreleases.rss
    healthcheck_url: https://www.sec.gov
    parser_key: rss_v1
    poll_cron: "*/10 * * * *"
    ranking_weight: 1.4
    coverage_tags:
      - regulatory
      - enforcement
      - markets
    active: true
    config:
      canonical_domain: sec.gov
      dedupe_strategy: canonical_url
      summary_mode: first_paragraph
      category_bias: high_signal
      fixture_path: source_payloads/sec_press_releases.xml

  - source_key: sec_current_forms
    display_name: SEC Current Major Forms
    source_type: api
    adapter_key: sec_edgar_forms_v1
    region_code: us
    discovery_mode: current_filings_atom
    hydrate_mode: filing_detail_index_and_submission_text
    default_home_market_region_code: null
    source_class: regulatory_filing_feed
    default_source_tier: official_regulatory_storage
    base_url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcurrent&owner=include&output=atom
    healthcheck_url: https://www.sec.gov/edgar/search/
    parser_key: sec_current_filing_atom_v1
    poll_cron: "*/15 * * * *"
    ranking_weight: 1.7
    coverage_tags: [us, regulatory, filings]
    active: true
    config:
      supported_forms_now: [6-K]
      planned_forms_next: [8-K, SC TO-T, SC 14D-9, SC 13D/A]
      fixtures:
        discovery_feed: source_payloads/sec_current_filings_atom.xml
        detail_pages:
          0001193125-26-135605: source_payloads/sec_0001193125-26-135605_index.html
        submission_texts:
          000119312526135605: source_payloads/sec_000119312526135605.txt
