        metadata:
          fallback_to_fixture: true
          fixture_path: apps/backend/fixtures/daily_feed.sample.json
          top_n: 12
  schemas:
    Edition:
      type: string
      enum: [apac-open, europe-midday, us-close, breaking]
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    FeedDigest:
      type: object
      required:
        - digest_date
        - edition
        - timezone
        - generated_at
        - generated_by
        - item_count
        - items
      properties:
        digest_date:
          type: string
          format: date
        edition:
          $ref: '#/components/schemas/Edition'
        timezone:
          type: string
        generated_at:
          type: string
          format: date-time
        generated_by:
          type: string
          enum: [fixture, runtime]
        item_count:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/FeedDigestItem'
        metadata:
          type: object
          additionalProperties: true
    FeedDigestItem:
      type: object
      required:
        - story_key
        - priority_rank
        - headline
        - summary
        - canonical_url
        - published_at
        - source
        - tickers
        - regions
        - sectors
        - sentiment_label
      properties:
        story_key:
          type: string
        priority_rank:
          type: integer
          minimum: 1
        headline:
          type: string
        summary:
          type: string
        canonical_url:
          type: string
          format: uri
        published_at:
          type: string
          format: date-time
        source:
          $ref: '#/components/schemas/SourceRef'
        tickers:
          type: array
          items:
            type: string
        regions:
          type: array
          items:
            type: string
        sectors:
          type: array
          items:
            type: string
        sentiment_label:
          type: string
          enum: [positive, neutral, negative, mixed]
        relevance_score:
          type: number
        duplicate_group_key:
          type: string
        metadata:
          type: object
          additionalProperties: true
    SourceRef:
      type: object
      required: [source_key, display_name]
      properties:
        source_key:
          type: string
        display_name:
          type: string
