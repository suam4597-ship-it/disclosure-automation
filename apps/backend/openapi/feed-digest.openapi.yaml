openapi: 3.1.0
info:
  title: Disclosure Automation Feed Digest API
  version: 0.1.0
  summary: Phase 0 digest read API backed by canonical feed items or a fixture fallback.
  description: |
    Read-only endpoints exposed by the reference Phase 0 runtime.

    The current router exposes:
    - `GET /api/feed/digest/latest`
    - `GET /api/feed/digest/{digest_date}/{edition}`

    Both endpoints return the same digest envelope. The latest endpoint requires
    an `edition` query parameter and accepts an optional `timezone`.
servers:
  - url: http://localhost:4000
    description: Local Phoenix endpoint
tags:
  - name: feed-digest
    description: Daily edition digest retrieval
paths:
  /api/feed/digest/latest:
    get:
      tags: [feed-digest]
      operationId: getLatestFeedDigest
      summary: Fetch the latest digest for an edition
      parameters:
        - in: query
          name: edition
          required: true
          schema:
            $ref: '#/components/schemas/Edition'
          description: Digest edition to resolve.
        - in: query
          name: timezone
          required: false
          schema:
            type: string
            default: UTC
          description: |
            IANA timezone used when "latest" is resolved to a digest date.
      responses:
        '200':
          description: Digest found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedDigest'
              examples:
                apacOpen:
                  summary: Sample APAC open digest
                  value:
                    $ref: '#/components/examples/FeedDigestExample/value'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                missingEdition:
                  value:
                    error:
                      code: missing_edition
                      message: edition is required
        '404':
          description: Digest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/feed/digest/{digest_date}/{edition}:
    get:
      tags: [feed-digest]
      operationId: getFeedDigestByDateAndEdition
      summary: Fetch a digest by digest date and edition
      parameters:
        - in: path
          name: digest_date
          required: true
          schema:
            type: string
            format: date
        - in: path
          name: edition
          required: true
          schema:
            $ref: '#/components/schemas/Edition'
      responses:
        '200':
          description: Digest found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedDigest'
              examples:
                usClose:
                  value:
                    $ref: '#/components/examples/FeedDigestExample/value'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Digest not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
